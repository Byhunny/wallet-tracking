mode: simulation        # "simulation" (quote-only) | "simulate-tx" (signed + simulated on-chain) | "live" (sent on-chain)

helius:
  ws_url: "wss://mainnet.helius-rpc.com"   # standard Solana JSON-RPC websocket
  rpc_url: "https://mainnet.helius-rpc.com"
  # api_key is read from env: HELIUS_API_KEY

wallet:
  follow: "REPLACE_WITH_WALLET_ADDRESS_TO_FOLLOW"
  # bot's private key is read from env: BOT_PRIVATE_KEY (base58, only used in live mode)

trading:
  position_size_ratio: 1.0      # 1:1 — mirror the wallet's exact SOL spend per buy
                                # (this wallet doesn't oversize buys, so copy it fully)
  # fixed_position_sol: 1.0     # uncomment to use a constant per-buy SOL spend (overrides ratio)

  # Take-profit ladder. List of {at: gain_pct, sell: pct_of_initial} rungs.
  # Front-loaded: most pumps die in the 30-100% range, so bank more early.
  # Each rung fires once when the threshold is crossed; multiple rungs can
  # fire on a single price tick if price jumps past several at once.
  # MIRROR philosophy: the followed wallet's edge IS the moonshots (7 trades
  # >500% in 24h). An aggressive early ladder throws that edge away by dumping
  # before the big move. So we only de-risk lightly, then RIDE with the wallet.
  ladder:
    - { at: 100, sell: 25 }  # after a 2x, bank 25% (covers cost + fees) — rest rides
    # remaining 75% exits WITH the wallet (ignore_wallet_exit=false) or via trailing

  # Risk controls — set to MIRROR a good wallet, not to override it. A tight
  # stop + early ladder was converting the wallet's dip-then-moon winners into
  # our losers. Now: no tight stop, trailing armed high so winners run, and the
  # wallet's own exit is primary.
  stop_loss_pct: 50             # catastrophe-only (the wallet's worst losers are
                                # <-50%); a tight stop cut winners mid-dip
  trailing_stop_pct: 40         # after arming, exit if price falls 40% from peak
  trailing_arm_at_pct: 80       # arm only after +80% — let moonshots run, protect
                                # a big reversal without capping the 5-10x moves
  breakeven_after_steps: 0      # OFF — the wallet's edge is holding through dips;
                                # don't cut on an entry-price touch
  ignore_wallet_exit: false     # MIRROR the wallet's exit — it timed 7 trades to
                                # >500% in 24h; its exit is the signal, not ours
  entry_delay_seconds: 1        # minimal anti-flip; less lag matters more when
                                # copying a wallet whose entries are the edge

  slippage_bps: 500             # 5%
  # Priority-fee CAP per swap tx: maxLamports = this / 1000. 200M µlamports =
  # 200k lamports = 0.0002 SOL (~$0.03) — enough to land on hot memecoin
  # accounts; Jupiter's "high" priority level only bids what's needed under it.
  # The old 100000 (=100 lamports) was far too low to land under contention.
  priority_fee_microlamports: 200000000
  min_position_sol: 0.03        # below this, per-tx fees eat >5% of the position
  max_position_sol: 5.0         # cap above this
  excluded_mints:
    - "So11111111111111111111111111111111111111112"  # wSOL
    - "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"  # USDC
    - "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB"  # USDT

price:
  poll_interval_seconds: 8      # per-position sell-quote cadence. Keep >=8 on the
                                # keyless lite-api (~1 req/s) or you WILL hit 429;
                                # the client also rate-gates requests internally.
  # lite-api is keyless but rate-limited (~1 req/sec). For heavier traffic
  # set JUPITER_API_KEY env and swap these to https://api.jup.ag/swap/v1/...
  jupiter_quote_url: "https://lite-api.jup.ag/swap/v1/quote"
  jupiter_swap_url: "https://lite-api.jup.ag/swap/v1/swap"

telegram:
  enabled: true
  # bot_token is read from env: TELEGRAM_BOT_TOKEN
  # owner_id  is read from env: TELEGRAM_OWNER_ID (numeric Telegram user id)

storage:
  db_path: "./bot.db"

log:
  level: "info"                 # debug | info | warn | error
